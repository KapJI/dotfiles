{{ $default_refresh := "168h" | quote }}

{{ $binary_suffix := "" }}
{{ if eq .osid "windows" }}
{{ $binary_suffix = ".exe" }}
{{ end }}

[".config/eza/theme.yml"]
    type = "file"
    url = "https://raw.githubusercontent.com/eza-community/eza-themes/refs/heads/main/themes/catppuccin-mocha.yml"
    refreshPeriod = {{ $default_refresh }}


{{ if ne .osid "windows" }}
[".config/zsh/antidote"]
    type = "git-repo"
    url = "https://github.com/mattmc3/antidote.git"
    refreshPeriod = {{ $default_refresh }}
{{ end }}

{{ if eq .osid "windows" }}
["Documents/PowerShell/Completion/bat.ps1"]
    type = "archive-file"
    url = "{{ gitHubLatestReleaseAssetURL "sharkdp/bat" "*x86_64-pc-windows-msvc*" }}"
    stripComponents = 1
    path = "autocomplete/_bat.ps1"
    refreshPeriod = {{ $default_refresh }}

["Documents/PowerShell/Completion/hyperfine.ps1"]
    type = "archive-file"
    url = "{{ gitHubLatestReleaseAssetURL "sharkdp/hyperfine" "*x86_64-pc-windows-msvc*" }}"
    stripComponents = 1
    path = "autocomplete/_hyperfine.ps1"
    refreshPeriod = {{ $default_refresh }}
{{ end }}

{{ if and (eq .chezmoi.os "linux") (not .is_desktop) }}
[".tmux/plugins/tpm"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tpm"
    refreshPeriod = {{ $default_refresh }}
{{ end }}

{{ if and (eq .chezmoi.os "linux") .is_desktop }}
# Icon-only Nerd Font, fallback for glyphs missing from MesloLGS NF.
# macOS gets it from the font-symbols-only-nerd-font cask in packages.yaml.
[".local/share/fonts/SymbolsNerdFontMono-Regular.ttf"]
    type = "archive-file"
    url = "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/NerdFontsSymbolsOnly.tar.xz"
    path = "SymbolsNerdFontMono-Regular.ttf"
    refreshPeriod = {{ $default_refresh }}

# Powerlevel10k-recommended MesloLGS NF (Powerline + small Nerd Font subset).
# romkatv/powerlevel10k-media is a fonts-only mirror; no tagged releases exist.
[".local/share/fonts/MesloLGS NF Regular.ttf"]
    type = "file"
    url = "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Regular.ttf"
    refreshPeriod = {{ $default_refresh }}

[".local/share/fonts/MesloLGS NF Bold.ttf"]
    type = "file"
    url = "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold.ttf"
    refreshPeriod = {{ $default_refresh }}

[".local/share/fonts/MesloLGS NF Italic.ttf"]
    type = "file"
    url = "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Italic.ttf"
    refreshPeriod = {{ $default_refresh }}

[".local/share/fonts/MesloLGS NF Bold Italic.ttf"]
    type = "file"
    url = "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold%20Italic.ttf"
    refreshPeriod = {{ $default_refresh }}
{{ end }}

["{{ printf ".local/bin/tree-sitter%s" $binary_suffix }}"]
    type = "file"
    decompress = "gzip"
    url = "{{ gitHubLatestReleaseAssetURL "tree-sitter/tree-sitter" (printf "tree-sitter-%s-%s.gz" (.chezmoi.os | replace "darwin" "macos") (.chezmoi.arch | replace "amd64" "x64")) }}"
    executable = true
    refreshPeriod = {{ $default_refresh }}
