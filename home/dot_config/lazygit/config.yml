# lazygit — catppuccin mocha, blue accent.
# Theme verbatim from https://github.com/catppuccin/lazygit
# (themes/mocha/blue.yml). lazygit finds this file via LG_CONFIG_FILE,
# exported in zsh env.zsh on every platform. snacks.nvim launches
# lazygit with `configure = false` so it does not append its own
# auto-generated theme after this one in LG_CONFIG_FILE.
gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#89b4fa"
      - bold
    inactiveBorderColor:
      - "#a6adc8"
    searchingActiveBorderColor:
      - "#f9e2af"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    inactiveViewSelectedLineBgColor:
      - "#6c7086"
    cherryPickedCommitFgColor:
      - "#89b4fa"
    cherryPickedCommitBgColor:
      - "#45475a"
    markedBaseCommitFgColor:
      - "#89b4fa"
    markedBaseCommitBgColor:
      - "#f9e2af"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
  authorColors:
    "*": "#b4befe"
# Edit files picked in lazygit in the running Neovim (was provided by
# snacks's `configure`; restated here since we disabled it).
os:
  editPreset: nvim-remote
