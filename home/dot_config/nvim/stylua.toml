# stylua config for this Neovim config. Non-hidden filename (not
# .stylua.toml) so it is auto-discovered both in the chezmoi *target*
# tree (~/.config/nvim, where conform's format-on-save runs it) and in
# the *source* tree (~/.local/share/chezmoi/home/..., where the
# pre-commit hook runs it) — chezmoi would rename a dotfile to
# dot_stylua.toml in source and stylua wouldn't find it.
column_width = 120
indent_type = "Spaces"
indent_width = 2
quote_style = "AutoPreferDouble"
call_parentheses = "Always"
